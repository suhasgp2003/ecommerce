{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'contact/css/contact.css' %}">
    <script src="{% static 'contact/script.js' %}"></script>
    
</head>
<body>
    <h1>Student Registration</h1>
    <form action="",method=['POST']>
        {% csrf_token %}
        <label>Name</label>
        <input type="text" name="S_name" placeholder="Enter name"><br>
        <label>Age</label>
        <input type="number" name="age" placeholder="Enter age"><br>
        <button type="submit">Submit</button>
    </form>
    <hr>
    <h2>Latest Submitted data </h2>
    
    <p><strong>Name:</strong>
    {{name}}</p>
    <p><strong>Age:</strong>{{age}}</p>
    <hr>
    <h2>All students</h2>
    <table border="1" cellpadding="10">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
        </tr>
        {% for contact in contacts %}
        <tr>
            <td>{{contact.id}}</td>
            <td>{{contact.name}}</td>
            <td>{{contact.age}}</td>    
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">
                No Records Found
            </td>
        </tr>
        {% endfor %}
    </table>
    
    

    
</body>
</html>
